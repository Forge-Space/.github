name: Reusable Secret Scanning

on:
  workflow_call:

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@v3.93.7
        with:
          extra_args: --only-verified
