name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      image-name:
        description: Docker image name (e.g. "forgespace/mcp-gateway")
        required: true
        type: string
      dockerfile:
        description: Path to Dockerfile
        required: false
        type: string
        default: "Dockerfile"
      context:
        description: Docker build context path
        required: false
        type: string
        default: "."
      platforms:
        description: Target platforms (comma-separated)
        required: false
        type: string
        default: "linux/amd64"
      push:
        description: Push image to registry
        required: false
        type: boolean
        default: false
      tag-strategy:
        description: "Tag strategy: 'version' (from package/pyproject), 'git' (tag/sha), or 'custom'"
        required: false
        type: string
        default: "git"
      custom-tags:
        description: Custom tags (newline-separated, used when tag-strategy=custom)
        required: false
        type: string
        default: ""
      build-args:
        description: Docker build args (newline-separated KEY=VALUE)
        required: false
        type: string
        default: ""
      test-command:
        description: Command to test the built image (empty to skip)
        required: false
        type: string
        default: ""
    secrets:
      DOCKER_USERNAME:
        required: false
      DOCKER_PASSWORD:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        if: contains(inputs.platforms, ',')
        uses: docker/setup-qemu-action@v3

      - name: Login to Docker Hub
        if: inputs.push && env.DOCKER_USERNAME != ''
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Login to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          TAG_STRATEGY: ${{ inputs.tag-strategy }}
          CUSTOM_TAGS: ${{ inputs.custom-tags }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_REF_TYPE: ${{ github.ref_type }}
        run: |
          TAGS=""
          case "$TAG_STRATEGY" in
            version)
              if [ -f package.json ]; then
                VERSION=$(node -p "require('./package.json').version")
              elif [ -f pyproject.toml ]; then
                VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
              fi
              TAGS="ghcr.io/$IMAGE_NAME:$VERSION"
              TAGS="$TAGS,ghcr.io/$IMAGE_NAME:latest"
              ;;
            git)
              SHA=$(git rev-parse --short HEAD)
              TAGS="ghcr.io/$IMAGE_NAME:$SHA"
              if [ -n "$GH_REF_NAME" ] && [ "$GH_REF_TYPE" = "tag" ]; then
                TAGS="$TAGS,ghcr.io/$IMAGE_NAME:${GH_REF_NAME#v}"
                TAGS="$TAGS,ghcr.io/$IMAGE_NAME:latest"
              fi
              ;;
            custom)
              TAGS="$CUSTOM_TAGS"
              ;;
          esac
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        if: inputs.test-command != ''
        env:
          IMAGE_TAG: ${{ steps.tags.outputs.tags }}
          TEST_COMMAND: ${{ inputs.test-command }}
        run: |
          FIRST_TAG=$(echo "$IMAGE_TAG" | cut -d',' -f1)
          docker run --rm "$FIRST_TAG" $TEST_COMMAND
